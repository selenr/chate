<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:20px;
    background:black;
}

/* CONTAINER */
.container {
    max-width:450px;
    width:100%;
    text-align:center;
    display:flex;
    flex-direction:column;
    min-height:90vh;
}

.content { flex:1; }

/* PROFILE */
.profile {
    position:relative;
    width:120px;
    height:120px;
    margin:50px auto 15px;
    border-radius:50%;
    overflow:hidden;
}

.profile img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* VERIFIED */
.verified {
    position:absolute;
    bottom:5px;
    right:5px;
    width:30px;
    height:30px;
    border-radius:50%;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 10px rgba(0,114,255,0.8);
    opacity:0;
    transform:scale(0.5);
}

.verified i {
    color:white;
    font-size:14px;
}

/* ANIMASI VERIFIED */
@keyframes fadeIn {
    to { opacity:1; transform:scale(1); }
}

@keyframes pulsePremium {
    0% { transform:scale(1); }
    50% { transform:scale(1.1); }
    100% { transform:scale(1); }
}

.verified.active {
    animation: fadeIn 0.5s forwards, pulsePremium 2s infinite;
}

/* TITLE */
h1 {
    font-size:1.8rem;
    margin-bottom:20px;
    color:white;
}

/* BUTTON */
.btn-group {
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn {
    display:flex;
    align-items:center;
    background:rgba(30,25,47,0.6);
    border-radius:50px;
    padding:12px 20px;
    border:1px solid rgba(255,255,255,0.3);
    cursor:pointer;
    text-decoration: none;
}

.btn-left {
    display:flex;
    align-items:center;
    gap:15px;
}

.icon {
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.wa .icon { background:#25D366; color:white; }
.tg .icon { background:#2AABEE; color:white; }

.btn-info h3 { color:white; }

/* ===== ANIMASI BUTTON ===== */

/* WA utama */
.wa {
  animation: pulseBtn 3s infinite, glowBtn 3s infinite;
}

/* TELEGRAM */
.tg {
  transition:0.2s;
}

/* PULSE */
@keyframes pulseBtn {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* GLOW */
@keyframes glowBtn {
  0% { box-shadow: 0 0 5px rgba(37,211,102,0.5); }
  50% { box-shadow: 0 0 18px rgba(37,211,102,1); }
  100% { box-shadow: 0 0 5px rgba(37,211,102,0.5); }
}

/* SHAKE */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* FOOTER */
.footer {
    font-size:0.75rem;
    color:#aaa;
    margin-top:30px;
}
</style>
</head>

<body>

<div class="container">

<div class="content">

    <div class="profile">
        <img id="profileImg">

        <div class="verified" id="verified">
            <i class="fas fa-check"></i>
        </div>
    </div>

    <h1>🔥Join Active Groups🔥</h1>

    <div class="btn-group">
        <a class="btn wa" id="waLink" target="_blank" rel="noopener noreferrer">
            <div class="btn-left">
                <div class="icon"><i class="fab fa-whatsapp"></i></div>
                <div class="btn-info"><h3>WhatsApp</h3></div>
            </div>
        </a>

        <a class="btn tg" id="tgLink" target="_blank" rel="noopener noreferrer">
            <div class="btn-left">
                <div class="icon"><i class="fab fa-telegram-plane"></i></div>
                <div class="btn-info"><h3>Telegram</h3></div>
            </div>
        </a>
    </div>

</div>

<div class="footer">🔞 18+ Only • Verified Members</div>

</div>

<!-- CONFIG -->
<script src="config.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

    const profileImg = document.getElementById('profileImg');
    const verified = document.getElementById('verified');
    const waBtn = document.getElementById("waLink");
    const tgBtn = document.getElementById("tgLink");

    let waClicked = false;

    if (typeof config !== 'undefined') {

        if (config.profileImage) {
            profileImg.src = config.profileImage;
        }

        // VERIFIED
        setTimeout(() => {
            verified.classList.add("active");
        }, 500);

        // BACKGROUND SLIDE
        const backgrounds = config.backgrounds || [];
        let index = 0;

        function changeBackground() {
            if (backgrounds.length === 0) return;

            document.body.style.backgroundImage = `url('${backgrounds[index]}')`;
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            document.body.style.transition = "background-image 1s ease-in-out";

            index = (index + 1) % backgrounds.length;
        }

        changeBackground();
        setInterval(changeBackground, 4000);
    }

    // =========================
    // SET LINK KE TOMBOL (pakai href, bukan JavaScript)
    // =========================
    
    // Set link WhatsApp
    if (waBtn && typeof config !== 'undefined') {
        const waLink = config.whatsappLink || config.waLink;
        if (waLink) {
            waBtn.href = waLink;
        } else {
            waBtn.href = "#";
            waBtn.addEventListener("click", function(e) {
                if (!waBtn.href || waBtn.href === "#" || waBtn.href === window.location.href) {
                    e.preventDefault();
                    alert("Link WhatsApp belum tersedia di config");
                }
            });
        }
        
        // Catat klik untuk animasi
        waBtn.addEventListener("click", function() {
            waClicked = true;
        });
    }
    
    // Set link Telegram
    if (tgBtn && typeof config !== 'undefined') {
        const tgLink = config.telegramLink || config.tgLink;
        if (tgLink) {
            tgBtn.href = tgLink;
        } else {
            tgBtn.href = "#";
            tgBtn.addEventListener("click", function(e) {
                if (!tgBtn.href || tgBtn.href === "#" || tgBtn.href === window.location.href) {
                    e.preventDefault();
                    alert("Link Telegram belum tersedia di config");
                }
            });
        }
    }

    // =========================
    //  ANIMASI (tetap sama persis)
    // =========================

    // WA attention awal
    setTimeout(() => {
        waBtn.style.animation = "none";

        setTimeout(() => {
            waBtn.style.animation = "shake 0.4s";
        }, 50);

        setTimeout(() => {
            waBtn.style.animation = "pulseBtn 3s infinite, glowBtn 3s infinite";
        }, 500);
    }, 1200);

    // telegram shake normal
    setInterval(() => {
        tgBtn.style.animation = "shake 0.4s";

        setTimeout(() => {
            tgBtn.style.animation = "none";
        }, 400);
    }, 7000);

    // telegram boost jika WA tidak diklik
    setTimeout(() => {
        if (!waClicked) {

            tgBtn.style.animation = "pulseBtn 2s infinite";

            setInterval(() => {
                tgBtn.style.animation = "shake 0.4s";

                setTimeout(() => {
                    tgBtn.style.animation = "pulseBtn 2s infinite";
                }, 400);

            }, 5000);
        }
    }, 8000);

});
</script>

</body>
</html>
