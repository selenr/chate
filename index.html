<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: black;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        .content {
            flex: 1;
        }

        .profile {
            width: 120px;
            height: 120px;
            margin: 50px auto 15px;
            border-radius: 50%;
            border: 1px solid black;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: red;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            background: rgba(30, 25, 47, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        .wa .icon { background: #075e54; color: white; }
        .tg .icon { background: #2aabee; color: white; }

        .btn-info h3 {
            color: white;
        }

        .footer {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="content">
        <div class="profile">
            <img id="profileImg">
        </div>

        <h1>❤️ Adult Whatsapp Groups ❤️</h1>

        <div class="btn-group">
            <div class="btn wa" id="waLink">
                <div class="btn-left">
                    <div class="icon"><i class="fab fa-whatsapp"></i></div>
                    <div class="btn-info"><h3>Whatsapp</h3></div>
                </div>
            </div>

            <div class="btn tg" id="tgLink">
                <div class="btn-left">
                    <div class="icon"><i class="fab fa-telegram-plane"></i></div>
                    <div class="btn-info"><h3>Telegram</h3></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">🔞 18+ Only • Verified Members</div>

</div>

<script src="config.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

    const profileImg = document.getElementById('profileImg');
    const waBtn = document.getElementById('waLink');
    const tgBtn = document.getElementById('tgLink');

    // ✅ ambil dari config
    if (typeof config !== 'undefined') {
        if (config.profileImage) profileImg.src = config.profileImage;

        // 🔥 BACKGROUND SLIDE
        const backgrounds = config.backgrounds || [];
        let index = 0;

        function changeBackground() {
            if (backgrounds.length === 0) return;

            document.body.style.backgroundImage = `url('${backgrounds[index]}')`;
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            document.body.style.transition = "background-image 1s ease-in-out";

            index = (index + 1) % backgrounds.length;
        }

        changeBackground();
        setInterval(changeBackground, 5000);
    }

    function handleClick(btn, link) {
        if (!link || link === '#') {
            alert("Link belum diatur");
            return;
        }
        window.open(link, '_blank');
    }

    waBtn.addEventListener('click', () => {
        handleClick(waBtn, config?.whatsappLink);
    });

    tgBtn.addEventListener('click', () => {
        handleClick(tgBtn, config?.telegramLink);
    });

});
</script>

</body>
</html>
