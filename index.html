<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:20px;
    background:black;
}

/* CONTAINER */
.container {
    max-width:450px;
    width:100%;
    text-align:center;
}

/* PROFILE */
.profile {
    position:relative;
    width:120px;
    height:120px;
    margin:50px auto 15px;
    border-radius:50%;
    overflow:hidden;
}

.profile img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* VERIFIED */
.verified {
    position:absolute;
    bottom:5px;
    right:5px;
    width:30px;
    height:30px;
    border-radius:50%;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transform:scale(0.5);
}

.verified i {
    color:white;
    font-size:14px;
}

/* animasi */
@keyframes fadeIn {
    to { opacity:1; transform:scale(1); }
}

@keyframes pulsePremium {
    0% { transform:scale(1); }
    50% { transform:scale(1.1); }
    100% { transform:scale(1); }
}

.verified.active {
    animation: fadeIn 0.5s forwards, pulsePremium 2s infinite;
}

/* TITLE */
h1 {
    color:white;
    margin-bottom:15px;
}

/* BUTTON */
.btn-group {
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn {
    display:flex;
    align-items:center;
    border-radius:50px;
    padding:12px 20px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.3);
    background:rgba(30,25,47,0.6);
}

.btn-left {
    display:flex;
    align-items:center;
    gap:15px;
}

.icon {
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.wa .icon { background:#25D366; color:white; }
.tg .icon { background:#2AABEE; color:white; }

.btn-info h3 { color:white; }

/* ANIMASI BUTTON */
@keyframes pulseBtn {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

@keyframes glowBtn {
  0% { box-shadow: 0 0 5px rgba(37,211,102,0.5); }
  50% { box-shadow: 0 0 18px rgba(37,211,102,1); }
  100% { box-shadow: 0 0 5px rgba(37,211,102,0.5); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* WA utama */
.wa {
  animation: pulseBtn 3s infinite, glowBtn 3s infinite;
}

/* FOOTER */
.footer {
    font-size:12px;
    color:#aaa;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="profile">
    <img src="https://via.placeholder.com/150">
    <div class="verified" id="verified">
        <i class="fas fa-check"></i>
    </div>
</div>

<h1>🔥 Join Group Aktif 🔥</h1>

<div class="btn-group">
    <div class="btn wa">
        <div class="btn-left">
            <div class="icon"><i class="fab fa-whatsapp"></i></div>
            <div class="btn-info"><h3>Masuk WhatsApp</h3></div>
        </div>
    </div>

    <div class="btn tg">
        <div class="btn-left">
            <div class="icon"><i class="fab fa-telegram-plane"></i></div>
            <div class="btn-info"><h3>Masuk Telegram</h3></div>
        </div>
    </div>
</div>

<div class="footer">🔞 18+ Only • Verified Members</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const verified = document.getElementById("verified");
const waBtn = document.querySelector(".wa");
const tgBtn = document.querySelector(".tg");

let waClicked = false;

/* VERIFIED */
setTimeout(()=>{
  verified.classList.add("active");
},500);

/* BACKGROUND SLIDE */
const backgrounds = [
  "bg1.jpg",
  "bg2.jpg"
];

let index = 0;

function changeBg(){
  document.body.style.backgroundImage = `url('${backgrounds[index]}')`;
  document.body.style.backgroundSize = "cover";
  document.body.style.backgroundPosition = "center";
  index = (index + 1) % backgrounds.length;
}

changeBg();
setInterval(changeBg,4000);

/* WA ATTENTION AWAL */
setTimeout(()=>{
  waBtn.style.animation="none";

  setTimeout(()=>{
    waBtn.style.animation="shake 0.4s";
  },50);

  setTimeout(()=>{
    waBtn.style.animation="pulseBtn 3s infinite, glowBtn 3s infinite";
  },500);

},1200);

/* DETEKSI KLIK WA */
waBtn.addEventListener("click", ()=>{
  waClicked = true;
});

/* TELEGRAM SHAKE */
setInterval(()=>{
  tgBtn.style.animation="shake 0.4s";

  setTimeout(()=>{
    tgBtn.style.animation="none";
  },400);

},7000);

/* TELEGRAM BOOST JIKA WA TIDAK DIKLIK */
setTimeout(()=>{
  if(!waClicked){

    tgBtn.style.animation="pulseBtn 2s infinite";

    setInterval(()=>{
      tgBtn.style.animation="shake 0.4s";

      setTimeout(()=>{
        tgBtn.style.animation="pulseBtn 2s infinite";
      },400);

    },5000);
  }
},8000);

});
</script>

</body>
</html>
